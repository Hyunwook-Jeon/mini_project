# ============================================================
# dsr_realsense_pick_place 설정 파일
# ============================================================

object_detector:
  ros__parameters:
    # --- 카메라 토픽 ---
    color_topic: "/camera/camera/color/image_raw"
    depth_topic: "/camera/camera/aligned_depth_to_color/image_raw"
    camera_info_topic: "/camera/camera/color/camera_info"

    # --- TF 프레임 ---
    camera_frame: "camera_color_optical_frame"
    robot_base_frame: "base_link"   # Doosan base frame

    # --- YOLO 설정 ---
    use_yolo: true
    yolo_model: "yolov8n.pt"        # yolov8n/s/m/l/x.pt 중 선택
    confidence_threshold: 0.5

    # 인식할 클래스 목록 (빈 리스트이면 모든 클래스)
    # COCO 클래스 이름 사용: https://docs.ultralytics.com/datasets/detect/coco/
    target_classes: ["bottle", "cup", "bowl", "sports ball", "orange", "apple"]

    # --- Depth 파라미터 ---
    depth_scale: 0.001              # mm → m (RealSense 기본값)
    min_depth_m: 0.15               # 최소 유효 깊이 (m)
    max_depth_m: 1.5                # 최대 유효 깊이 (m)
    depth_sample_radius: 5          # depth 샘플링 반경 (픽셀)
    selected_object_topic: "/selected_object_label"

pick_place_node:
  ros__parameters:
    # --- 로봇 설정 ---
    robot_namespace: "dsr01"
    robot_model: "e0509"

    # --- 속도/가속도 ---
    joint_vel: 30.0                 # deg/s
    joint_acc: 60.0                 # deg/s^2
    cart_vel: 100.0                 # mm/s
    cart_acc: 200.0                 # mm/s^2

    # --- 홈 포지션 (관절 각도, deg) ---
    home_joints: [0.0, 0.0, 90.0, 0.0, 90.0, 0.0]

    # --- 그리퍼 설정 ---
    # gripper_type: "digital_io" | "robotiq"
    gripper_type: "digital_io"
    gripper_open_io: 1              # 열기 Digital Output 포트
    gripper_close_io: 2             # 닫기 Digital Output 포트
    gripper_wait_sec: 0.8           # 그리퍼 동작 대기 시간 (s)

    # --- Pick 파라미터 ---
    pre_pick_z_offset: 0.12         # Pick 위 대기 높이 오프셋 (m)
    pick_z_offset: 0.005            # 실제 픽 높이 보정 (m)
    grasp_rpy: [0.0, 180.0, 0.0]    # 그리퍼 자세 (rx, ry, rz deg)
                                    # [0, 180, 0] = 수직 하강

    # --- Place 파라미터 ---
    # Place 위치 (로봇 베이스 기준, m)
    place_position: [0.4, -0.3, 0.1]
    pre_place_z_offset: 0.15        # Place 위 대기 높이 (m)
    place_rpy: [0.0, 180.0, 0.0]

    # --- 안전 설정 ---
    workspace_x_min: 0.15           # 작업 영역 제한 (m)
    workspace_x_max: 0.80
    workspace_y_min: -0.60
    workspace_y_max: 0.60
    workspace_z_min: 0.0
    workspace_z_max: 0.60
    target_pose_topic: "/selected_object_pose"

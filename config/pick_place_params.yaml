# ============================================================
# dsr_realsense_pick_place 설정 파일
# ============================================================

object_detector:
  ros__parameters:
    # --- 카메라 토픽 ---
    color_topic: "/camera/camera/color/image_raw"
    depth_topic: "/camera/camera/aligned_depth_to_color/image_raw"
    camera_info_topic: "/camera/camera/color/camera_info"

    # --- TF 프레임 ---
    camera_frame: "camera_color_optical_frame"
    robot_base_frame: "base_link"   # Doosan base frame

    # --- YOLO 설정 ---
    use_yolo: true
    yolo_model: "~/doosan_ws/src/mini_project/best.pt"
    confidence_threshold: 0.5

    # 인식할 클래스 목록 (빈 리스트이면 모든 클래스)
    # COCO 클래스 이름 사용: https://docs.ultralytics.com/datasets/detect/coco/
    target_classes: ["doll", "pack", "pencil", "tape", "cup"]

    # --- Depth 파라미터 ---
    depth_scale: 0.001              # mm → m (RealSense 기본값)
    min_depth_m: 0.15               # 최소 유효 깊이 (m)
    max_depth_m: 1.5                # 최대 유효 깊이 (m)
    depth_sample_radius: 5          # depth 샘플링 반경 (픽셀)
    depth_center_ratio: 0.6         # 샘플링 반경 내 사용 비율 (0~1)
    depth_outlier_mad_scale: 2.5    # MAD 이상치 제거 스케일 팩터
    selected_object_topic: "/selected_object_label"


        # ★ 아래 내용 추가 ★
    # --- 좌표 변환 모드 ---
    # true: 수동 원점 오프셋 방식 (TF 없이 동작, 캘리브레이션 필요)
    # false: TF2 방식 (static TF가 정확히 설정된 경우 사용)
    use_manual_absolute_origin: True   # 일단 TF 방식으로 시작

    # --- 수동 절대좌표 원점 (use_manual_absolute_origin: true 일 때 사용) ---
    # 카메라 좌표계 기준 로봇 base_link 원점의 위치 (m)
    # 실측 후 채워넣기
    absolute_origin_in_camera_x_m: -0.80
    absolute_origin_in_camera_y_m: 0.0
    absolute_origin_in_camera_z_m: -0.96

    # --- 보정값 (mm) ---
    absolute_calib_x_mm: -20.0
    absolute_calib_y_mm: -20.0
    absolute_calib_z_mm: 140.0

# ─── 기존 내용 아래에 추가 ───────────────────────────────────────────

rh_p12_rna_gripper:
  ros__parameters:
    robot_ns: "dsr01"      
    stroke_close: 1000        
    motion_wait: 1.5           
    svc_timeout: 10.0
    init_current: 400
    cube_current: 300
    
pick_place_node:
  ros__parameters:
    # --- 로봇 설정 ---
    robot_namespace: "dsr01"

    # --- 속도/가속도 ---
    joint_vel: 30.0                 # deg/s
    joint_acc: 60.0                 # deg/s^2
    cart_vel: 100.0                 # mm/s
    cart_acc: 200.0                 # mm/s^2

    # --- 홈 포지션 (관절 각도, deg) ---
    home_joints: [0.0, 0.0, 90.0, 0.0, 90.0, 0.0]

    # --- 그리퍼 설정 ---
    gripper_wait_sec: 0.1           # 그리퍼 동작 대기 시간 (s)

    # --- ROBOTIS RH-P12-Rn 설정 ---
    rh12_serial_service: "/dsr01/gripper/serial_send_data"
    rh12_bridge_topic: "/gripper/rh12_stroke_cmd"
    rh12_allow_missing_service: true
    rh12_slave_id: 1
    rh12_torque_enable_register: 256
    rh12_goal_current_register: 275
    rh12_stroke_register: 282
    rh12_goal_current: 400
    rh12_open_stroke: 700
    rh12_close_stroke: 0
    rh12_port: 1
    rh12_init_wait_sec: 0.1

    # --- Pick 파라미터 ---
    pre_pick_z_offset: 0.12         # Pick 위 대기 높이 오프셋 (m)
    pick_z_offset: 0.005            # 실제 픽 높이 보정 (m)
    grasp_rpy: [0.0, 180.0, 0.0]    # 그리퍼 자세 (rx, ry, rz deg)
                                    # [0, 180, 0] = 수직 하강

    # --- Place 파라미터 ---
    # Place 위치 (로봇 베이스 기준, m)
    place_position: [0.4, -0.3, 0.1]
    pre_place_z_offset: 0.15        # Place 위 대기 높이 (m)
    place_rpy: [0.0, 180.0, 0.0]

    # --- 안전 설정 ---
    workspace_x_min: 0.15           # 작업 영역 제한 (m)
    workspace_x_max: 0.80
    workspace_y_min: -0.60
    workspace_y_max: 0.60
    workspace_z_min: 0.0
    workspace_z_max: 0.60
    target_pose_topic: "/selected_object_pose"
